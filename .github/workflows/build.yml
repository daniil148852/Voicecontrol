name: Android Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  GEODE_SDK_URL: "https://github.com/geode-sdk/geode/archive/refs/heads/main.zip"

jobs:
  build:
    name: Build Android ${{ matrix.abi }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        id: setup_ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install Ninja
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build unzip

      - name: Download and extract Geode SDK
        shell: bash
        run: |
          echo "Downloading Geode SDK from $GEODE_SDK_URL ..."
          curl -L --retry 3 -o /tmp/geode-sdk.zip "$GEODE_SDK_URL"
          unzip -q /tmp/geode-sdk.zip -d /tmp/geode-sdk-tmp
          mv /tmp/geode-sdk-tmp/geode-main geode
          echo "Geode SDK extracted to $(pwd)/geode"
          ls -la geode/

      - name: Ensure miniaudio header exists
        shell: bash
        run: |
          mkdir -p src/libs
          if [ ! -f src/libs/miniaudio.h ]; then
            echo "miniaudio.h not found, downloading from upstream..."
            curl -L --retry 3 \
              https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h \
              -o src/libs/miniaudio.h
          fi

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build/${{ matrix.abi }} -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-23 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup_ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake

      - name: Build
        shell: bash
        run: |
          cmake --build build/${{ matrix.abi }} --config Release --parallel "$(nproc)"

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts/${{ matrix.abi }}
          find build/${{ matrix.abi }} -type f \( -name "*.geode" -o -name "*.so" \) -exec cp -v {} artifacts/${{ matrix.abi }}/ \;
          echo "Artifacts for ${{ matrix.abi }}:"
          ls -lah artifacts/${{ matrix.abi }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicecontrol-${{ matrix.abi }}
          path: artifacts/${{ matrix.abi }}/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: voicecontrol-*
          path: release-artifacts
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          find release-artifacts -type f -print

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          generate_release_notes: true
