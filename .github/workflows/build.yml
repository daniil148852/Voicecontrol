name: Android Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android ${{ matrix.abi }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          # Do NOT use set -euo pipefail here.
          # yes dying from SIGPIPE when sdkmanager stops reading
          # is normal and must not be treated as an error.
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' \
            > "$ANDROID_SDK_ROOT/licenses/intel-android-extra-license"
          echo "Licenses written."

      - name: Install base Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platform-tools" "platforms;android-23"

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail

          echo "::group::Available NDK packages"
          sdkmanager --list 2>/dev/null \
            | grep -oE 'ndk;[0-9]+(\.[0-9]+)+' \
            | sort -Vu \
            || true
          echo "::endgroup::"

          NDK_PKG=""

          for candidate in \
            "ndk;29.0.13113456" \
            "ndk;28.0.13004108" \
            "ndk;28.0.12674087" \
            "ndk;27.2.12479018"
          do
            echo "Trying NDK package: $candidate"
            if sdkmanager "$candidate" 2>&1; then
              NDK_PKG="$candidate"
              echo "Successfully installed: $NDK_PKG"
              break
            else
              echo "Package not available: $candidate"
            fi
          done

          if [ -z "$NDK_PKG" ]; then
            echo "ERROR: Failed to install any NDK package from the candidate list."
            exit 1
          fi

          NDK_ROOT="$(ls -d "$ANDROID_SDK_ROOT"/ndk/* 2>/dev/null | sort -V | tail -n 1)"

          if [ -z "$NDK_ROOT" ] || [ ! -d "$NDK_ROOT" ]; then
            echo "ERROR: Could not locate NDK directory under $ANDROID_SDK_ROOT/ndk/"
            exit 1
          fi

          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "Using NDK at: $NDK_ROOT"

      - name: Verify Clang version
        shell: bash
        run: |
          set -euo pipefail

          CLANGXX="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++"

          if [ ! -x "$CLANGXX" ]; then
            echo "ERROR: clang++ not found at $CLANGXX"
            exit 1
          fi

          "$CLANGXX" --version

          CLANG_MAJOR="$(
            "$CLANGXX" --version \
              | head -n 1 \
              | sed -E 's/.*version ([0-9]+)\..*/\1/'
          )"

          echo "Detected Clang major version: $CLANG_MAJOR"

          if [ -z "$CLANG_MAJOR" ]; then
            echo "ERROR: Could not parse Clang version string."
            exit 1
          fi

          if [ "$CLANG_MAJOR" -lt 19 ]; then
            echo "ERROR: Clang $CLANG_MAJOR is too old. Geode requires Clang 19 or newer."
            echo "Try a newer NDK package."
            exit 1
          fi

          echo "Clang version OK: $CLANG_MAJOR"

      - name: Download Geode SDK if missing
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "geode" ] && [ -f "geode/CMakeLists.txt" ]; then
            echo "Geode SDK already present at ./geode"
            exit 0
          fi

          echo "Geode SDK not found. Downloading..."
          rm -rf /tmp/geode-sdk.zip /tmp/geode-sdk-tmp

          curl -L --retry 3 --fail \
            "https://github.com/geode-sdk/geode/archive/refs/heads/main.zip" \
            -o /tmp/geode-sdk.zip

          unzip -q /tmp/geode-sdk.zip -d /tmp/geode-sdk-tmp
          mv /tmp/geode-sdk-tmp/geode-main geode

          echo "Geode SDK extracted:"
          ls -la geode/

      - name: Ensure miniaudio header exists
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p src/libs

          if [ ! -f src/libs/miniaudio.h ]; then
            echo "Downloading miniaudio.h from upstream..."
            curl -L --retry 3 --fail \
              "https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h" \
              -o src/libs/miniaudio.h
            echo "miniaudio.h downloaded."
          else
            echo "miniaudio.h already present."
          fi

          ls -lah src/libs/miniaudio.h

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail

          echo "Configuring for ABI: ${{ matrix.abi }}"
          echo "NDK path: $NDK_ROOT"
          echo "Toolchain: $NDK_ROOT/build/cmake/android.toolchain.cmake"

          cmake -S . -B "build/${{ matrix.abi }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI="${{ matrix.abi }}" \
            -DANDROID_PLATFORM=android-23 \
            -DANDROID_STL=c++_shared \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_ROOT/build/cmake/android.toolchain.cmake"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build "build/${{ matrix.abi }}" \
            --config Release \
            --parallel "$(nproc)"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "artifacts/${{ matrix.abi }}"

          find "build/${{ matrix.abi }}" -type f \
            \( -name "*.geode" -o -name "*.so" \) \
            -exec cp -v {} "artifacts/${{ matrix.abi }}/" \;

          echo "Artifacts collected for ${{ matrix.abi }}:"
          ls -lah "artifacts/${{ matrix.abi }}/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicecontrol-${{ matrix.abi }}
          path: artifacts/${{ matrix.abi }}/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: voicecontrol-*
          path: release-artifacts
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          find release-artifacts -type f -print

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          generate_release_notes: true
