name: Android Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android ${{ matrix.abi }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        shell: bash
        run: |
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license"
          printf '\nd975f751698a77b662f1254ddbeed3901e976f5a' \
            > "$ANDROID_SDK_ROOT/licenses/intel-android-extra-license"
          echo "Licenses written."

      - name: Install base Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager "platform-tools" "platforms;android-23"

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail

          NDK_PKG=""

          for candidate in \
            "ndk;29.0.14206865" \
            "ndk;29.0.13113456" \
            "ndk;28.0.13004108" \
            "ndk;28.0.12674087" \
            "ndk;27.2.12479018"
          do
            echo "Trying NDK package: $candidate"
            if sdkmanager "$candidate" 2>&1; then
              NDK_PKG="$candidate"
              echo "Successfully installed: $NDK_PKG"
              break
            else
              echo "Package not available: $candidate"
            fi
          done

          if [ -z "$NDK_PKG" ]; then
            echo "ERROR: Failed to install any NDK package."
            exit 1
          fi

          NDK_ROOT="$(ls -d "$ANDROID_SDK_ROOT"/ndk/* 2>/dev/null | sort -V | tail -n 1)"

          if [ -z "$NDK_ROOT" ] || [ ! -d "$NDK_ROOT" ]; then
            echo "ERROR: Could not locate NDK directory."
            exit 1
          fi

          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "Using NDK at: $NDK_ROOT"

      - name: Verify Clang version
        shell: bash
        run: |
          set -euo pipefail

          CLANGXX="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++"

          if [ ! -x "$CLANGXX" ]; then
            echo "ERROR: clang++ not found at $CLANGXX"
            exit 1
          fi

          "$CLANGXX" --version

          CLANG_MAJOR="$(
            "$CLANGXX" --version \
              | head -n 1 \
              | sed -E 's/.*version ([0-9]+)\..*/\1/'
          )"

          echo "Detected Clang major version: $CLANG_MAJOR"

          if [ -z "$CLANG_MAJOR" ]; then
            echo "ERROR: Could not parse Clang version."
            exit 1
          fi

          if [ "$CLANG_MAJOR" -lt 19 ]; then
            echo "ERROR: Clang $CLANG_MAJOR is too old. Geode requires Clang 19+."
            exit 1
          fi

          echo "Clang version OK: $CLANG_MAJOR"

      - name: Install Geode CLI
        shell: bash
        run: |
          set -euo pipefail

          echo "Fetching latest Geode CLI release info..."

          CLI_URL="$(
            curl -fsSL https://api.github.com/repos/geode-sdk/cli/releases/latest \
              | grep -oE '"browser_download_url": "[^"]+-linux\.zip"' \
              | grep -oE 'https://[^"]+' \
              | head -n 1
          )"

          if [ -z "$CLI_URL" ]; then
            echo "ERROR: Could not determine Geode CLI download URL."
            exit 1
          fi

          echo "Downloading Geode CLI from: $CLI_URL"
          curl -fsSL --retry 3 "$CLI_URL" -o /tmp/geode-cli.zip
          unzip -q /tmp/geode-cli.zip -d /tmp/geode-cli

          CLI_BIN="$(find /tmp/geode-cli -type f -name 'geode' | head -n 1)"
          if [ -z "$CLI_BIN" ]; then
            echo "ERROR: geode binary not found after extracting CLI."
            ls -lah /tmp/geode-cli/
            exit 1
          fi

          chmod +x "$CLI_BIN"
          sudo mv "$CLI_BIN" /usr/local/bin/geode

          geode --version
          echo "Geode CLI installed."

      - name: Download Geode SDK if missing
        shell: bash
        run: |
          set -euo pipefail

          if [ -d "geode" ] && [ -f "geode/CMakeLists.txt" ]; then
            echo "Geode SDK already present at ./geode"
          else
            echo "Downloading Geode SDK..."
            rm -rf /tmp/geode-sdk.zip /tmp/geode-sdk-tmp

            curl -fsSL --retry 3 \
              "https://github.com/geode-sdk/geode/archive/refs/heads/main.zip" \
              -o /tmp/geode-sdk.zip

            unzip -q /tmp/geode-sdk.zip -d /tmp/geode-sdk-tmp
            mv /tmp/geode-sdk-tmp/geode-main geode

            echo "Geode SDK extracted."
          fi

          GEODE_SDK="$(pwd)/geode"
          echo "GEODE_SDK=$GEODE_SDK" >> "$GITHUB_ENV"
          echo "Geode SDK path: $GEODE_SDK"

      - name: Install Geode SDK loader binaries
        shell: bash
        run: |
          set -euo pipefail

          echo "Setting up Geode CLI profile for CI..."

          # The CLI needs a config directory and a profile entry
          # pointing to a valid-looking GD install path.
          # In CI we create a fake GD directory so the CLI accepts it.

          FAKE_GD_DIR="/tmp/fake-gd"
          mkdir -p "$FAKE_GD_DIR"

          # Touch a fake GD executable so the CLI path check passes.
          touch "$FAKE_GD_DIR/GeometryDash"
          chmod +x "$FAKE_GD_DIR/GeometryDash"

          # Geode CLI stores its config in ~/.config/geode on Linux.
          GEODE_CONFIG_DIR="$HOME/.config/geode"
          mkdir -p "$GEODE_CONFIG_DIR"

          # Write a minimal config.json that gives the CLI a named profile.
          cat > "$GEODE_CONFIG_DIR/config.json" <<EOF
          {
            "current": "ci",
            "profiles": [
              {
                "name": "ci",
                "gd-path": "$FAKE_GD_DIR",
                "geode-path": "$FAKE_GD_DIR/geode"
              }
            ]
          }
          EOF

          mkdir -p "$FAKE_GD_DIR/geode"

          echo "Geode CLI config written:"
          cat "$GEODE_CONFIG_DIR/config.json"

          echo "Installing Geode loader binaries into SDK..."
          export GEODE_SDK="$GEODE_SDK"
          geode sdk install-binaries

          echo "Loader binaries installed."
          echo "Contents of geode/bin/ (if present):"
          ls -lah "$GEODE_SDK/bin/" 2>/dev/null || echo "(no bin directory yet)"

      - name: Ensure miniaudio header exists
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p src/libs

          if [ ! -f src/libs/miniaudio.h ]; then
            echo "Downloading miniaudio.h..."
            curl -fsSL --retry 3 \
              "https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h" \
              -o src/libs/miniaudio.h
          else
            echo "miniaudio.h already present."
          fi

          ls -lah src/libs/miniaudio.h

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail

          echo "Configuring for ABI : ${{ matrix.abi }}"
          echo "NDK path            : $NDK_ROOT"
          echo "Geode SDK path      : $GEODE_SDK"

          cmake -S . -B "build/${{ matrix.abi }}" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI="${{ matrix.abi }}" \
            -DANDROID_PLATFORM=android-23 \
            -DANDROID_STL=c++_shared \
            -DGEODE_SDK="$GEODE_SDK" \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_ROOT/build/cmake/android.toolchain.cmake"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          cmake --build "build/${{ matrix.abi }}" \
            --config Release \
            --parallel "$(nproc)"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "artifacts/${{ matrix.abi }}"

          find "build/${{ matrix.abi }}" -type f \
            \( -name "*.geode" -o -name "*.so" \) \
            -exec cp -v {} "artifacts/${{ matrix.abi }}/" \;

          echo "Artifacts for ${{ matrix.abi }}:"
          ls -lah "artifacts/${{ matrix.abi }}/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voicecontrol-${{ matrix.abi }}
          path: artifacts/${{ matrix.abi }}/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: voicecontrol-*
          path: release-artifacts
          merge-multiple: true

      - name: Show release files
        shell: bash
        run: |
          find release-artifacts -type f -print

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          generate_release_notes: true
